<script>
(function () {
  "use strict";
  var blob = JSON.parse(document.getElementById("transom-blob").textContent);
  // WebCrypto (crypto.subtle) is only present in a SECURE CONTEXT — HTTPS, or
  // http://localhost. Over plain HTTP to a LAN/Tailscale IP it's undefined, so
  // decryption can't even start. Say that plainly instead of "key is invalid".
  if (!window.isSecureContext || !(window.crypto && window.crypto.subtle)) {
    document.getElementById("lock-msg").textContent =
      "This page must be opened over HTTPS (or localhost) — decryption needs a " +
      "secure context. The published GitHub Pages link is HTTPS and works; a " +
      "plain http:// LAN address does not.";
    return;
  }
  var enc = function (s) { return Uint8Array.from(atob(s), function (c) { return c.charCodeAt(0); }); };
  var b64urlToBytes = function (s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return enc(s);
  };
  function show(msg) { document.getElementById("lock-msg").textContent = msg; }
  function reveal(plaintext) {
    // Replace the ENTIRE document with the decrypted note. document.write()
    // after the page has loaded leaves the lock shell behind (the note renders
    // *below* it); swapping <html> wholesale is clean. importNode does not run
    // scripts, which is fine — the note is static HTML.
    var doc = new DOMParser().parseFromString(plaintext, "text/html");
    document.replaceChild(
      document.importNode(doc.documentElement, true),
      document.documentElement
    );
  }
  async function decryptWith(keyBytes) {
    var key = await crypto.subtle.importKey("raw", keyBytes, "AES-GCM", false, ["decrypt"]);
    var pt = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: enc(blob.iv) }, key, enc(blob.ct));
    return new TextDecoder().decode(pt);
  }
  async function wordKey(word) {
    var base = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(word), "PBKDF2", false, ["deriveBits"]);
    var bits = await crypto.subtle.deriveBits(
      { name: "PBKDF2", salt: enc(blob.salt), iterations: blob.iter, hash: "SHA-256" },
      base, 256);
    return new Uint8Array(bits);
  }
  if (blob.mode === "link") {
    var m = (location.hash || "").match(/[#&]k=([A-Za-z0-9_-]+)/);
    if (!m) {
      show("this link is missing its key — the note can't be unlocked without the full link.");
      return;
    }
    var keyBytes;
    try { keyBytes = b64urlToBytes(m[1]); } catch (e) { show("this link's key is invalid."); return; }
    // Scrub the key from the address bar BEFORE revealing, so screenshots,
    // re-copies, and later-injected scripts can't re-propagate it.
    try { history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
    decryptWith(keyBytes).then(reveal, function () { show("this link's key is invalid."); });
  } else {
    show("");
    document.getElementById("word-ui").style.display = "block";
    var go = function () {
      var w = document.getElementById("word").value;
      if (!w) return;
      wordKey(w).then(decryptWith).then(reveal, function () {
        document.getElementById("err").textContent = "Nope. The vault stays shut. 🙅";
      });
    };
    document.getElementById("unlock").addEventListener("click", go);
    document.getElementById("word").addEventListener("keydown", function (e) {
      if (e.key === "Enter") go();
    });
  }
})();
</script>
